name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-22.04-arm, macos-26-intel, macos-26, windows-2022, windows-11-arm]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # The module is pure Go (no cgo), so no development headers or C toolchain are needed anywhere. These are
      # the libraries unison dlopens at runtime on Linux; installed so the environment matches a user machine
      # (any test that dlopens them can run rather than skip).
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libx11-6 \
            libgl1

      # The race detector isn't supported on windows/arm64, so run the tests
      # without it there (--lint --test instead of --all). Everywhere else,
      # build.sh runs the race tests with CGO_ENABLED=1 on non-macOS platforms
      # because Go's prebuilt race runtime requires cgo there — the runners'
      # preinstalled C toolchains cover that; the module itself has no cgo.
      - name: Build
        run: |
          if [ "$RUNNER_OS" = "Windows" ] && [ "$RUNNER_ARCH" = "ARM64" ]; then
            ./build.sh --lint --test
          else
            ./build.sh --all
          fi

      # Build the example app, naming the binary after the target platform and
      # architecture (e.g. example-macos-arm64, example-windows-amd64.exe).
      - name: Build example
        id: example
        env:
          CGO_ENABLED: 0
        run: |
          goos=$(go env GOOS)
          goarch=$(go env GOARCH)
          platform=$goos
          [ "$goos" = "darwin" ] && platform=macos
          name="example-$platform-$goarch"
          [ "$goos" = "windows" ] && name="$name.exe"
          go build -o "dist/$name" ./cmd/example
          echo "artifact_name=example-$platform-$goarch" >> "$GITHUB_OUTPUT"

      - name: Upload example artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.example.outputs.artifact_name }}
          path: dist/
          if-no-files-found: error

  # The module is pure Go, so every platform can be compiled from one host. Cross-building all six OS/arch pairs
  # catches compile breakage on platforms whose native runners might be slow, missing, or skipped — cheap insurance
  # that was impossible in the cgo era.
  cross-build:
    name: Cross-build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-build all platforms
        env:
          CGO_ENABLED: 0
        run: |
          for goos in darwin linux windows; do
            for goarch in amd64 arm64; do
              echo "::group::$goos/$goarch"
              GOOS=$goos GOARCH=$goarch go build ./...
              echo "::endgroup::"
            done
          done
